name: Trend Radar Crawler

on:
  schedule:
    # 每6小时运行一次（UTC时间）
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run crawler
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Starting TrendRadar crawler..."
        python -m crawler.main --config config/config.yaml
        echo "Crawler completed."

    - name: Check for changes
      id: changes
      run: |
        git status --porcelain | grep . > /dev/null && echo "changes=true" >> $GITHUB_OUTPUT || echo "changes=false" >> $GITHUB_OUTPUT

    - name: Commit and push results
      if: steps.changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Update trending data [skip ci]"
        git push origin HEAD:${{ github.ref_name }}
