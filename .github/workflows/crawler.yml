name: Daily TrendRadar Crawler

on:
  schedule:
    # UTC 0-14 点 = 北京时间 8-22 点，每小时整点运行
    - cron: "0 0-14 * * *"
  push:
    tags:
      - "v*"
      - "mcp-v*"
  workflow_dispatch:
    inputs:
      image:
        description: "选择要运行的爬虫"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - crawler
          - mcp

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/mcp-v')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.image == 'all' || github.event.inputs.image == 'crawler'))

    env:
      TZ: Asia/Shanghai
      PUSH_MODE: incremental
      WEIGHT_RANK_WEIGHT: 0.4
      WEIGHT_FREQUENCY_WEIGHT: 0.5
      WEIGHT_HOTNESS_WEIGHT: 0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser openai beautifulsoup4 pytz PyYAML

      - name: Run crawler
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SOURCES: hn,producthunt
          OUTPUT_DIR: ./output
          LANGUAGE: zh
          LLM_PROVIDER: openai
          OPENAI_MODEL: gpt-4o-mini
        run: |
          mkdir -p output
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if [ -f output/latest.md ]; then
            cp output/latest.md ./TrendRadar.md
            git add TrendRadar.md
            git commit -m "chore: update TrendRadar $(date +%Y-%m-%d-%H)" || echo "No changes"
            git push
          else
            echo "No output file"
          fi

  run-mcp:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/mcp-v')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.image == 'all' || github.event.inputs.image == 'mcp'))

    env:
      TZ: Asia/Shanghai
      PUSH_MODE: incremental
      WEIGHT_RANK_WEIGHT: 0.4
      WEIGHT_FREQUENCY_WEIGHT: 0.5
      WEIGHT_HOTNESS_WEIGHT: 0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser openai beautifulsoup4 pytz PyYAML

      - name: Run MCP crawler
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SOURCES: mcp
          OUTPUT_DIR: ./output
          LANGUAGE: zh
          LLM_PROVIDER: openai
          OPENAI_MODEL: gpt-4o-mini
        run: |
          mkdir -p output
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          if [ -f output/latest.md ]; then
            cp output/latest.md ./MCP-TrendRadar.md
            git add MCP-TrendRadar.md
            git commit -m "chore: update MCP TrendRadar $(date +%Y-%m-%d-%H)" || echo "No changes"
            git push
          else
            echo "No output file"
          fi
