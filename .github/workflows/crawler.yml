name: Hourly TrendRadar Crawler (8AM–10PM)

on:
  schedule:
    # 北京时间 8:00 到 22:00 每小时运行一次（UTC 0–14）
    - cron: "0 0-14 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests feedparser openai beautifulsoup4 python-dotenv pytz PyYAML

      - name: Create output directory
        run: mkdir -p output

      - name: Patch config.yaml for incremental mode and custom weights
        run: |
          # 确保 config 目录存在（有些仓库可能没有）
          mkdir -p config
          # 如果 config.yaml 不存在，创建一个最小版本
          if [ ! -f config/config.yaml ]; then
            echo "report:" > config/config.yaml
            echo "  mode: daily" >> config/config.yaml
            echo "weight:" >> config/config.yaml
            echo "  rank_weight: 0.6" >> config/config.yaml
            echo "  frequency_weight: 0.3" >> config/config.yaml
            echo "  hotness_weight: 0.1" >> config/config.yaml
          fi
          # 动态修改配置（临时生效，不污染仓库）
          sed -i 's/mode: .*/mode: "incremental"/' config/config.yaml
          sed -i 's/rank_weight: .*/rank_weight: 0.4/' config/config.yaml
          sed -i 's/frequency_weight: .*/frequency_weight: 0.5/' config/config.yaml
          sed -i 's/hotness_weight: .*/hotness_weight: 0.1/' config/config.yaml

      - name: Run crawler
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          OUTPUT_DIR: ./output
          LANGUAGE: zh
        run: |
          python main.py

      - name: Commit and push results (non-fatal on failure)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # 尝试复制输出文件（静默失败）
          cp output/*.md . 2>/dev/null || true

          # 如果有变更，尝试提交（失败也不中断）
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: update TrendRadar $(date +%Y-%m-%d %H:%M)" || true
            git push || echo "⚠️ Git push failed (non-fatal). Crawler succeeded."
          else
            echo "✅ No changes to commit"
          fi
