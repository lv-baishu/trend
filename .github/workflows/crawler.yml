name: Hourly TrendRadar Crawler (8AM–10PM)

on:
  schedule:
    # 北京时间 8:00 到 22:00 每小时运行一次（UTC 0–14）
    - cron: "0 0-14 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests feedparser openai beautifulsoup4 python-dotenv pytz PyYAML

      - name: Create output directory
        run: mkdir -p output

      - name: Run crawler with incremental mode via env var
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          REPORT_MODE: incremental          # ← 覆盖 config.yaml 中的 mode
          RANK_WEIGHT: "0.4"                # ← 覆盖权重（如果支持）
          FREQUENCY_WEIGHT: "0.5"
          HOTNESS_WEIGHT: "0.1"
          OUTPUT_DIR: ./output
          LANGUAGE: zh
        run: |
          python main.py

      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update TrendRadar $(date +%Y-%m-%d %H:%M)"
            git push
          else
            echo "No changes to commit"
          fi
