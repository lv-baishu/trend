name: Daily TrendRadar Automation

on:
  schedule:
    # UTC 时间 0-14 点，对应北京时间 8-22 点，每小时一次
    - cron: "0 0-14 * * *"
  push:
    tags:
      - "v*"
      - "mcp-v*"
  workflow_dispatch:
    inputs:
      task:
        description: "选择要执行的任务"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - crawler
          - mcp

env:
  PUSH_MODE: incremental
  WEIGHT_RANK_WEIGHT: 0.4
  WEIGHT_FREQUENCY_WEIGHT: 0.5
  WEIGHT_HOTNESS_WEIGHT: 0.1

jobs:
  run-trendradar-crawler:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/mcp-v')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'crawler'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      - name: Run TrendRadar Crawler
        env:
          PUSH_MODE: ${{ env.PUSH_MODE }}
          WEIGHT_RANK_WEIGHT: ${{ env.WEIGHT_RANK_WEIGHT }}
          WEIGHT_FREQUENCY_WEIGHT: ${{ env.WEIGHT_FREQUENCY_WEIGHT }}
          WEIGHT_HOTNESS_WEIGHT: ${{ env.WEIGHT_HOTNESS_WEIGHT }}
        run: |
          echo "Running TrendRadar Crawler with Incremental Push Mode and Weights..."
          # 这里假设存在一个脚本或命令用于启动 trendradar 的 crawler 部分
          # 比如：python ./path/to/trendradar_crawler.py
          # 注意确保该脚本能够读取到环境变量中的权重和推送模式
          python ./path/to/trendradar_crawler.py

  run-trendradar-mcp:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/mcp-v')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'all' || github.event.inputs.task == 'mcp'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      - name: Run TrendRadar MCP
        env:
          PUSH_MODE: ${{ env.PUSH_MODE }}
          WEIGHT_RANK_WEIGHT: ${{ env.WEIGHT_RANK_WEIGHT }}
          WEIGHT_FREQUENCY_WEIGHT: ${{ env.WEIGHT_FREQUENCY_WEIGHT }}
          WEIGHT_HOTNESS_WEIGHT: ${{ env.WEIGHT_HOTNESS_WEIGHT }}
        run: |
          echo "Running TrendRadar MCP with Incremental Push Mode and Weights..."
          # 类似地，这里需要指定运行趋势雷达 MCP 部分的命令
          # 比如：python ./path/to/trendradar_mcp.py
          python ./path/to/trendradar_mcp.py
