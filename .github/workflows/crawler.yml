# config/crawler.yml
# TrendRadar 增量爬虫配置文件（仅用于控制运行模式与权重）

# 全局配置
global:
  # 推送模式：incremental 表示仅当有新增热点时才推送
  report_mode: "incremental"

  # 热点评分权重（按你的要求设定）
  weight:
    rank_weight: 0.4      # 适度看排名
    frequency_weight: 0.5 # 重视当天内的持续热度
    hotness_weight: 0.1   # 热度权重较低

  # 是否启用去重（避免重复推送）
  deduplicate: true

  # 是否持久化历史数据（用于判断“是否新增”）
  persist_history: true

  # 是否启用通知（可选，若未配置则忽略）
  notifier:
    type: "telegram"        # 示例：Telegram 通知
    chat_id: "your_chat_id"  # 替换为你的实际 ID
    bot_token: "your_bot_token"  # 替换为你的 Bot Token
