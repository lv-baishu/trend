# config/crawler.yml
# 严格遵循你的要求：仅配置增量检测模式 + 权重
# 检测平台已在 config/config.yaml 中配置，此处不重复定义

global:
  # 增量检测模式（只推送新出现的热点）
  report_mode: "incremental"
  
  # 热点评分权重（按你的要求精确配置）
  weight:
    rank_weight: 0.4    # 适度看排名
    frequency_weight: 0.5  # 重视当天内的持续热度
    hotness_weight: 0.1   # 低权重处理绝对热度值
  
  # 必需的基础配置（保持默认行为）
  deduplicate: true      # 启用去重
  persist_history: true  # 保存历史记录（增量检测必需）
  
  # 通知配置（保留占位符，实际值从 config.yaml 读取）
  notifier: {}
