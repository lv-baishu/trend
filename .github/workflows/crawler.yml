version: "3.0"

sources:
  - hn
  - producthunt

output:
  dir: "./output"
  format: "markdown"
  language: "zh"

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  max_tokens: 1500
  temperature: 0.7

notifications:
  feishu:
    enabled: true
    webhook_url: ""
  telegram:
    enabled: true
    bot_token: ""
    chat_id: ""

push_window:
  enabled: true   # ← 关键修改：从 false 改为 true
  start: "08:00"
  end: "22:00"

proxy:
  enabled: false
  http: ""
  https: ""

debug: false
user_agent: "TrendRadar-Crawler (+https://github.com/yourname/trendradar)"
